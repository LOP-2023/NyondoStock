<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>V Registration Form</title>
  </head>
  <style>
    .main {
      max-width: 800px;
      border: 2px double black;
      display: grid;
      grid-template-columns: 1fr 1fr;
      margin: auto;
      background-color: cornsilk;
      gap: 20px;
      border-radius: 8px;
      padding: 30px;
    }
    body {
      margin: 0;
      background-color: white;
      font-family: "Courier New", Courier, monospace;
    }
    h2 {
      text-align: center;
      grid-column: span 2;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input,
    select,
    textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    .ad {
      grid-column: span 2;
    }
    button {
        grid-column: span 2;
        padding: 12px;
        background: brown;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
      }
      button:hover {
        background: black;
      }
  </style>
  <body>
    <form class="main">
      <h2>V Registration Form</h2>
      <div>
        <label for="Company-name">Company name</label>
        <input
          type="text"
          id="Company-name"
          placeholder="Sherry and spe co."
          required
        />
      </div>
      <div>
        <label for="Trading-name">Trading name</label>
        <input
          type="text"
          placeholder="S & S suppliers Ug"
          id="Trading-name"
          required
        />
      </div>
      <div>
        <label for="Business-type">Business Type</label>
        <select>
          <option value="1">Sole proprietor</option>
          <option value="2">Partnership</option>
          <option value="3">Corporation</option>
          <option value="4">Other</option>
        </select>
      </div>
      <div>
        <label for="Registration-number">Registration number</label>
        <input
          type="number"
          id="registration_number"
          minlength="14"
          maxlength="14"
          placeholder="10345678478864"
          required
        />
      </div>
      <div>
        <label for="Year-established">Year Established</label>
        <input type="date" id="Year-established" required />
      </div>
      <div>
        <label for="Tax-Identification-Number">Tax identification Number</label>
        <input
          type="number"
          id="Tax-Identification-Number"
          placeholder="1052105432"
          required
        />
      </div>
      <div class="ad">
        <label for="">Address</label>
        <textarea name="" id="Address"></textarea>
      </div>
      <div>
        <label for="Director">Director</label>
        <input
          type="text"
          placeholder="Spellah Sherinah"
          id="Director"
          required
        />
      </div>
      <div>
        <label for="Contact">Contact</label>
        <input
          type="tel"
          placeholder="0754888980"
          id="Contact"
          minlength="10"
          maxlength="10"
        />
      </div>
      <div>
        <label for="Email">Email</label>
        <input
          type="text"
          id="Email"
          placeholder="nyondostock@gmail.com"
          required
        />
      </div>
      <div>
        <label for="Website">Website</label>
        <input
          type="text"
          placeholder="www.nyondostock.co.ug"
          id="Website"
          required
        />
      </div>
      <div class="ad">
        <label for="Goods/services-offered">Goods/services offered</label>
        <textarea name="" id="Goods/services-offered"></textarea>
      </div>
      <div>
        <label for="Bank-name">Bank name</label>
        <input type="number" placeholder="Equity bank" required />
      </div>
      <div>
        <label for="Bank-name">Bank name</label>
        <input
          type="number"
          id="Bank name"
          placeholder="1032103427507"
          maxlength="13"
          minlength="13"
        />
      </div>
      <div class="ad">
        <label for="Declaration">Declaration</label>
        <textarea name="" id="Declaration"></textarea>
      </div>
      <button type="submit">Submit Registration</button>
    </form>
  </body>
</html>
